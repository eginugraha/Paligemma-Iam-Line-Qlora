<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTR — Handwriting Recognition Compare</title>
    <!-- Poppins is the app-wide UI typeface. Loaded from Google Fonts with preconnect
         hints so the font request starts before HTML parsing finishes. display=swap
         renders text immediately in a fallback face and swaps to Poppins once it loads. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body>
    <div>%sveltekit.body%</div>
  </body>
</html>
